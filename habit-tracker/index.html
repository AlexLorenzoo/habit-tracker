<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Hábitos"/>
  <title>Habit Tracker</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0f1117;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;overscroll-behavior:none}
    #app{min-height:100vh;padding:16px;max-width:500px;margin:auto;padding-bottom:40px}
    .card{background:#1a1d27;border:1px solid #2d3148;border-radius:14px;padding:16px;margin-bottom:12px}
    .btn{background:transparent;border:1px solid #2d3148;color:#94a3b8;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;font-family:inherit}
    .btn:hover,.btn.active{background:#2d3148;color:#e2e8f0}
    .btn-primary{background:#4a4f72;border-color:#4a4f72;color:#e2e8f0}
    .hbtn{width:100%;border:none;border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500;text-align:left;font-family:inherit;transition:transform .12s,background .2s}
    .hbtn:active{transform:scale(0.97)}
    .pip{width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .bar-wrap{background:#2d3148;border-radius:99px;height:8px;overflow:hidden;margin:6px 0 2px}
    .bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
    .cell{width:32px;height:32px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid #2d3148;transition:transform .12s}
    .cell:active{transform:scale(0.9)}
    .tab-row{display:flex;gap:8px;margin-bottom:12px}
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;text-align:center;padding:24px}
    .login-card{background:#1a1d27;border:1px solid #2d3148;border-radius:16px;padding:32px 24px;width:100%;max-width:360px}
    .google-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#1a1d27;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;justify-content:center;font-family:inherit;margin-top:16px}
    .google-btn:active{opacity:.85}
    .streak{font-size:12px;font-weight:600;margin-left:auto}
    .disabled-day{opacity:.25;pointer-events:none}
    .gym-meta{font-size:11px;color:#64748b;margin-top:6px}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
    .pop{animation:pop .25s ease}
    .notif-bar{background:#1e2235;border:1px solid #3d4266;border-radius:10px;padding:12px 14px;font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .spinner{width:32px;height:32px;border:3px solid #2d3148;border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBy0qYfntZUA_9_Q4SaRaknjqthHdb4sZ4",
  authDomain: "habit-tracker-1de8d.firebaseapp.com",
  projectId: "habit-tracker-1de8d",
  storageBucket: "habit-tracker-1de8d.firebasestorage.app",
  messagingSenderId: "17190993251",
  appId: "1:17190993251:web:42de4c2e0e22cfe729e756"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const HABITS = [
  { id:"alimentacion", label:"Alimentación", icon:"🥗", color:"#4ade80", bg:"rgba(74,222,128,0.13)" },
  { id:"estudio",      label:"Estudio",       icon:"📚", color:"#60a5fa", bg:"rgba(96,165,250,0.13)" },
  { id:"dormir",       label:"Dormir",        icon:"🌙", color:"#a78bfa", bg:"rgba(167,139,250,0.13)", hours:true },
  { id:"lectura",      label:"Lectura",       icon:"📖", color:"#fbbf24", bg:"rgba(251,191,36,0.13)" },
  { id:"gym",          label:"Gym",           icon:"💪", color:"#f87171", bg:"rgba(248,113,113,0.13)", gymDays:[1,3,4,5,6] },
];

const LEVELS = [
  {name:"Novato",    min:0,   icon:"🌱", color:"#888"},
  {name:"Aprendiz",  min:15,  icon:"⚡", color:"#4ade80"},
  {name:"Constante", min:40,  icon:"🔥", color:"#60a5fa"},
  {name:"Dedicado",  min:70,  icon:"💎", color:"#a78bfa"},
  {name:"Élite",     min:100, icon:"🏆", color:"#fbbf24"},
  {name:"Leyenda",   min:140, icon:"👑", color:"#f87171"},
];

const DAY_NAMES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTH_NAMES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function toKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function today(){ return new Date(); }
function getWeekDates(ref){ const d=new Date(ref),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;}); }
function getMonthDates(ref){ const y=ref.getFullYear(),m=ref.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),pad=(first.getDay()+6)%7,days=[];for(let i=0;i<pad;i++)days.push(null);for(let d=1;d<=last.getDate();d++)days.push(new Date(y,m,d));while(days.length%7!==0)days.push(null);return days; }
function calcStreak(hid, data){ let s=0,d=new Date(today());while(true){const k=toKey(d);if(data[k]?.[hid]){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function calcPts(data){ return Object.values(data).reduce((sum,day)=>sum+Object.values(day).filter(v=>v&&v!==false).length,0); }
function getLevel(pts){ let l=LEVELS[0];for(const x of LEVELS)if(pts>=x.min)l=x;return l; }
function getNextLevel(pts){ for(const x of LEVELS)if(pts<x.min)return x;return null; }
function isGymDay(date){ return HABITS.find(h=>h.id==="gym").gymDays.includes(date.getDay()); }
function gymWeekCount(data){ const dates=getWeekDates(today());return dates.filter(d=>isGymDay(d)&&data[toKey(d)]?.gym).length; }

let userData = {};
let currentUser = null;
let unsubSnapshot = null;
let currentView = "week";
let animSet = new Set();
let hoursInput = {};

const root = document.getElementById("root");

function render(){ root.innerHTML = currentUser ? buildApp() : buildLogin(); attachEvents(); }

function buildLogin(){
  return `<div id="login-screen">
    <div class="login-card">
      <div style="font-size:48px;margin-bottom:12px">🏆</div>
      <h1 style="font-size:22px;font-weight:600;color:#e2e8f0;margin-bottom:6px">Habit Tracker</h1>
      <p style="font-size:14px;color:#64748b;margin-bottom:4px">Tu progreso, en cualquier dispositivo.</p>
      <button class="google-btn" id="btn-login">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.4 30.3 0 24 0 14.6 0 6.6 5.5 2.7 13.5l7.8 6C12.4 13.4 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.8 37.3 46.5 31.4 46.5 24.5z"/><path fill="#FBBC05" d="M10.5 28.5c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5l-7.8-6C1 16.4 0 20.1 0 24s1 7.6 2.7 10.5l7.8-6z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.4-5.7l-7.5-5.8c-2.1 1.4-4.7 2.2-7.9 2.2-6.2 0-11.5-4-13.4-9.5l-7.8 6C6.6 42.5 14.6 48 24 48z"/></svg>
        Continuar con Google
      </button>
    </div>
  </div>`;
}

function buildApp(){
  const t = today(), tk = toKey(t);
  const pts = calcPts(userData);
  const lvl = getLevel(pts), nxt = getNextLevel(pts);
  const lvlPct = nxt ? Math.min(100,Math.round(((pts-lvl.min)/(nxt.min-lvl.min))*100)) : 100;
  const gymCount = gymWeekCount(userData);
  const gymMeta = gymCount >= 4 ? "✅ Meta semanal cumplida" : gymCount === 3 ? "⚡ Bien — intentá llegar a 4" : `💪 ${gymCount}/4 días esta semana`;
  const todayHabits = HABITS.filter(h => !h.gymDays || isGymDay(t));
  const todayDone = todayHabits.filter(h => userData[tk]?.[h.id]).length;
  const pct = todayHabits.length ? Math.round(todayDone/todayHabits.length*100) : 0;
  const barColor = pct===100?"#4ade80":pct>=60?"#60a5fa":"#a78bfa";

  return `<div id="app">
    ${buildNotifBar()}
    ${buildHeader(lvl,nxt,lvlPct,pts)}
    ${buildToday(t,tk,todayHabits,todayDone,pct,barColor,gymMeta)}
    <div class="tab-row">
      <button class="btn ${currentView==="week"?"active":""}" data-view="week">Esta semana</button>
      <button class="btn ${currentView==="month"?"active":""}" data-view="month">Este mes</button>
      <button class="btn" id="btn-logout" style="margin-left:auto">Salir</button>
    </div>
    ${currentView==="week" ? buildWeek(t,tk) : buildMonth(t,tk)}
    <p style="text-align:center;font-size:11px;color:#334155;margin-top:8px">Sesión: ${currentUser.displayName}</p>
  </div>`;
}

function buildNotifBar(){
  if(typeof Notification === "undefined") return "";
  if(Notification.permission === "granted") return "";
  return `<div class="notif-bar">
    <span>🔔</span>
    <span style="flex:1">Activá notificaciones para no olvidarte</span>
    <button class="btn btn-primary" id="btn-notif" style="padding:5px 12px;font-size:12px">Activar</button>
  </div>`;
}

function buildHeader(lvl,nxt,pct,pts){
  return `<div class="card" style="display:flex;align-items:center;gap:14px">
    <div style="width:52px;height:52px;border-radius:50%;background:#12151f;border:2px solid ${lvl.color};display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${lvl.icon}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-weight:600;font-size:16px;color:${lvl.color}">${lvl.name}</span>
        <span style="font-size:12px;color:#64748b">${pts} pts</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${lvl.color}"></div></div>
      <span style="font-size:11px;color:#64748b">${nxt ? `${nxt.min-pts} pts para ${nxt.name}` : "¡Nivel máximo!"}</span>
    </div>
  </div>`;
}

function buildToday(t,tk,habits,done,pct,barColor,gymMeta){
  const rows = habits.map(h => {
    const isDone = !!userData[tk]?.[h.id];
    const streak = calcStreak(h.id, userData);
    const animClass = animSet.has(tk+h.id) ? "pop" : "";
    let extra = "";
    if(h.hours){
      const val = hoursInput[tk] ?? (userData[tk]?.dormir_horas || "");
      extra = `<input type="number" min="1" max="12" placeholder="hs" value="${val}" data-hours="${tk}"
        style="width:52px;border:1px solid #2d3148;background:#12151f;color:#e2e8f0;border-radius:6px;padding:4px 6px;font-size:13px;text-align:center;font-family:inherit"
        ${isDone?"":""}/>`;
    }
    return `<button class="hbtn ${animClass}" data-toggle="${h.id}" data-date="${tk}"
      style="background:${isDone?h.bg:"#12151f"};color:${isDone?h.color:"#94a3b8"};opacity:${isDone?1:0.6}">
      <div class="pip" style="color:${h.color};border-color:${h.color};background:${isDone?h.color:"transparent"}">
        ${isDone?`<span style="color:#0f1117;font-size:11px;font-weight:700">✓</span>`:""}
      </div>
      <span style="font-size:19px">${h.icon}</span>
      <span style="flex:1">${h.label}</span>
      ${extra}
      ${streak>0?`<span class="streak" style="color:${h.color}">🔥${streak}</span>`:""}
    </button>`;
  }).join("");

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-weight:600;font-size:15px">Hoy — ${DAY_NAMES[t.getDay()]} ${t.getDate()} de ${MONTH_NAMES[t.getMonth()]}</span>
      <span style="font-size:13px;color:${pct===100?"#4ade80":"#94a3b8"}">${done}/${habits.length}</span>
    </div>
    <div class="bar-wrap" style="margin-bottom:14px"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div style="display:flex;flex-direction:column;gap:8px">${rows}</div>
    <p class="gym-meta" style="margin-top:10px">${gymMeta}</p>
  </div>`;
}

function buildWeek(t,tk){
  const dates = getWeekDates(t);
  const headers = dates.map(d=>{
    const isT = toKey(d)===tk;
    return `<td style="text-align:center;font-size:11px;color:${isT?"#a78bfa":"#64748b"};font-weight:${isT?600:400};width:36px;padding-bottom:4px">
      ${DAY_NAMES[d.getDay()]}<br><span style="font-size:13px">${d.getDate()}</span>
    </td>`;
  }).join("");

  const rows = HABITS.map(h => {
    const cells = dates.map(d => {
      const dk = toKey(d);
      const isFuture = d > t && dk !== tk;
      const noGym = h.gymDays && !isGymDay(d);
      const done = !!userData[dk]?.[h.id];
      const animClass = animSet.has(dk+h.id) ? "pop" : "";
      if(noGym) return `<td><div style="width:32px;height:32px;margin:auto;opacity:.1;font-size:10px;display:flex;align-items:center;justify-content:center;color:#475569">–</div></td>`;
      return `<td><div class="cell ${animClass} ${isFuture?"disabled-day":""}" data-toggle="${h.id}" data-date="${dk}"
        style="margin:auto;background:${done?h.bg:"transparent"};border-color:${done?h.color+"44":"#2d3148"}">
        ${done?`<span style="font-size:15px">${h.icon}</span>`:`<span style="color:#334155;font-size:10px">·</span>`}
      </div></td>`;
    }).join("");
    return `<tr>
      <td style="font-size:13px;color:#94a3b8;padding-right:8px;white-space:nowrap;padding-bottom:6px">${h.icon} ${h.label}</td>
      ${cells}
    </tr>`;
  }).join("");

  return `<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:3px 4px">
    <thead><tr><td style="width:110px"></td>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}

function buildMonth(t,tk){
  const dates = getMonthDates(t);
  const dayHeaders = DAY_NAMES.map(d=>`<div style="text-align:center;font-size:10px;color:#475569">${d}</div>`).join("");
  const cells = dates.map((d,i) => {
    if(!d) return `<div></div>`;
    const dk = toKey(d);
    const isFuture = d > t && dk !== tk;
    const isT = dk === tk;
    const done = HABITS.filter(h=>(!h.gymDays||isGymDay(d))&&userData[dk]?.[h.id]).length;
    const total = HABITS.filter(h=>!h.gymDays||isGymDay(d)).length;
    const p = total ? done/total : 0;
    const bg = isFuture?"transparent":p===0?"#1a1d27":p<0.5?"rgba(167,139,250,0.15)":p<1?"rgba(96,165,250,0.2)":"rgba(74,222,128,0.2)";
    return `<div style="aspect-ratio:1;border-radius:7px;background:${bg};border:${isT?"1.5px solid #a78bfa":"1px solid #2d3148"};display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:${isT?"#a78bfa":isFuture?"#2d3148":"#94a3b8"};font-weight:${isT?700:400}">
      ${d.getDate()}
      ${!isFuture&&done>0?`<div style="font-size:8px;color:${p===1?"#4ade80":p>=.5?"#60a5fa":"#a78bfa"}">${done}/${total}</div>`:""}
    </div>`;
  }).join("");

  return `<div class="card">
    <div style="font-weight:600;font-size:14px;margin-bottom:10px;color:#94a3b8">${MONTH_NAMES[t.getMonth()]} ${t.getFullYear()}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">${dayHeaders}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>
    <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">
      ${[["#4ade80","100%"],["#60a5fa","≥50%"],["#a78bfa","<50%"]].map(([c,l])=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b"><div style="width:10px;height:10px;border-radius:3px;background:${c};opacity:.5"></div>${l}</div>`).join("")}
    </div>
  </div>`;
}

async function toggleHabit(habitId, dateKey){
  const cur = !!userData[dateKey]?.[habitId];
  userData[dateKey] = { ...(userData[dateKey]||{}), [habitId]: !cur };
  animSet.add(dateKey+habitId);
  render();
  setTimeout(()=>{ animSet.delete(dateKey+habitId); },300);
  await saveToFirestore();
}

async function saveToFirestore(){
  if(!currentUser) return;
  await setDoc(doc(db,"users",currentUser.uid),{ data: userData },{ merge:true });
}

async function loadFromFirestore(){
  if(!currentUser) return;
  const snap = await getDoc(doc(db,"users",currentUser.uid));
  if(snap.exists()) userData = snap.data().data || {};
  render();
}

function scheduleNotification(){
  if(typeof Notification === "undefined" || Notification.permission !== "granted") return;
  if(!("serviceWorker" in navigator)) return;
  navigator.serviceWorker.ready.then(sw => {
    const now = new Date(), target = new Date();
    target.setHours(21,0,0,0);
    if(now > target) target.setDate(target.getDate()+1);
    const delay = target - now;
    setTimeout(() => {
      sw.showNotification("⏰ Hábitos del día", {
        body: "No te olvides de registrar tus hábitos de hoy.",
        icon: "icon-192.png",
        badge: "icon-192.png",
        tag: "daily-habits",
        renotify: true,
      });
      scheduleNotification();
    }, delay);
  });
}

async function requestNotifications(){
  if(typeof Notification === "undefined") return;
  const perm = await Notification.requestPermission();
  if(perm === "granted"){ scheduleNotification(); render(); }
}

function attachEvents(){
  document.getElementById("btn-login")?.addEventListener("click", async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e){ console.error(e); }
  });
  document.getElementById("btn-logout")?.addEventListener("click", () => signOut(auth));
  document.getElementById("btn-notif")?.addEventListener("click", requestNotifications);
  document.querySelectorAll("[data-view]").forEach(b => b.addEventListener("click", () => { currentView = b.dataset.view; render(); }));
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", e => {
      if(e.target.tagName === "INPUT") return;
      toggleHabit(el.dataset.toggle, el.dataset.date);
    });
  });
  document.querySelectorAll("[data-hours]").forEach(inp => {
    inp.addEventListener("change", async () => {
      const dk = inp.dataset.hours, val = parseFloat(inp.value);
      hoursInput[dk] = inp.value;
      if(val >= 7){
        userData[dk] = { ...(userData[dk]||{}), dormir: true, dormir_horas: val };
        animSet.add(dk+"dormir");
        render();
        setTimeout(()=>{ animSet.delete(dk+"dormir"); },300);
      } else {
        userData[dk] = { ...(userData[dk]||{}), dormir: false, dormir_horas: val };
        render();
      }
      await saveToFirestore();
    });
  });
}

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user){
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div class="spinner"></div></div>`;
    await loadFromFirestore();
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("sw.js").then(()=>{
        if(Notification.permission==="granted") scheduleNotification();
      });
    }
  } else {
    userData = {};
    render();
  }
});
</script>
</body>
</html>
